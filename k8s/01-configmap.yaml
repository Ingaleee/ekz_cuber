apiVersion: v1
kind: ConfigMap
metadata:
  name: exam-web-config
  namespace: exam-k8s
  labels:
    app: exam-web
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>exam-web</title>
      <style>
        body {
          margin: 0;
          min-height: 100vh;
          display: grid;
          place-items: center;
          font-family: Arial, sans-serif;
          color: #172033;
          background: #f4f7fb;
        }
        main {
          padding: 32px;
          border: 1px solid #d9e2ef;
          border-radius: 8px;
          background: #ffffff;
          box-shadow: 0 12px 30px rgba(23, 32, 51, 0.08);
        }
        h1 {
          margin: 0 0 16px;
          font-size: 32px;
        }
        p {
          margin: 8px 0;
          font-size: 18px;
        }
      </style>
    </head>
    <body>
      <main>
        <h1>exam-web</h1>
        <p>Student: Egor Soloveyv</p>
        <p>Application version: v1</p>
      </main>
    </body>
    </html>
