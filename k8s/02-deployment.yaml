apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-web
  namespace: exam-k8s
  labels:
    app: exam-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: exam-web
  template:
    metadata:
      labels:
        app: exam-web
    spec:
      containers:
        - name: exam-web
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: exam-web-page
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
      volumes:
        - name: exam-web-page
          configMap:
            name: exam-web-config
            items:
              - key: index.html
                path: index.html
